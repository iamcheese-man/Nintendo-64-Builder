name: Nintendo 64 Build

on:
  workflow_dispatch:
    inputs:
      rom_type:
        description: 'ROM type to output (n64, z64, v64)'
        required: true
        default: n64

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ROM_TYPE: ${{ github.event.inputs.rom_type }}
      BUILD_DIR: ${{ github.workspace }}/build
      LIBDRAGON_DIR: ${{ github.workspace }}/libdragon
      LIBDRAGON_BUILD: ${{ github.workspace }}/libdragon_build

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc mips64el-elf-gcc build-essential

      - name: Clone Libdragon if missing
        run: |
          if [ ! -d "$LIBDRAGON_DIR" ]; then
            git clone https://github.com/DragonMinded/libdragon.git $LIBDRAGON_DIR
          fi

      - name: Build libdragon locally
        run: |
          mkdir -p $LIBDRAGON_BUILD
          make -C $LIBDRAGON_DIR DESTDIR=$LIBDRAGON_BUILD PREFIX=$LIBDRAGON_BUILD install

      - name: Make build directory
        run: mkdir -p $BUILD_DIR

      - name: Compile ROM
        run: |
          gcc -Wall -I$LIBDRAGON_BUILD/include \
              -L$LIBDRAGON_BUILD/lib -ldragon \
              main.c -o $BUILD_DIR/main.elf
          # Convert ELF to ROM type
          $LIBDRAGON_DIR/mtools/make -f $BUILD_DIR/main.elf -o $BUILD_DIR/main.$ROM_TYPE -t $ROM_TYPE

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: n64-rom
          path: $BUILD_DIR
