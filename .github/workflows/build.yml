name: Build N64 ROM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake pkg-config libpng-dev

      - name: Clone Libdragon
        run: |
          git clone --recursive https://github.com/DragonMinded/libdragon.git
          mkdir -p libdragon_build

      - name: Build Libdragon
        run: |
          make -C libdragon DESTDIR=$GITHUB_WORKSPACE/libdragon_build install

      - name: Build ROM
        run: |
          mkdir -p build
          make all

      - name: Upload ROMs
        uses: actions/upload-artifact@v4
        with:
          name: N64-ROMs
          path: build/
