name: Build N64 ROM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git gcc-mips64-elf

      - name: Clone libdragon
        run: |
          git clone https://github.com/DragonMinded/libdragon.git
          cd libdragon
          make

      - name: Build ROM
        run: |
          make

      - name: List built files
        run: |
          ls -l

      - name: Upload ROM artifacts
        uses: actions/upload-artifact@v3
        with:
          name: n64-roms
          path: |
            mygame.z64
            mygame.n64
            mygame.v64
