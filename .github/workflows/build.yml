name: Build N64 ROMs

on:
  workflow_dispatch:
    inputs:
      rom-format:
        description: 'Choose ROM format'
        required: true
        default: 'z64'
        type: choice
        options:
          - z64
          - n64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-mips-linux-gnu libncurses5-dev git

      - name: Install libdragon
        run: |
          if [ ! -d "libdragon" ]; then
            git clone https://github.com/DragonMinded/libdragon.git
          fi
          cd libdragon
          make install

      - name: Build ROM
        run: |
          echo "Building ROM format: ${{ github.event.inputs.rom-format }}"
          make OPTIONS="${{ github.event.inputs.rom-format }}"

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: n64-rom
          path: build/*
