name: Build N64 ROM

on:
  workflow_dispatch:
    inputs:
      format:
        description: 'ROM format to build'
        required: true
        default: n64
        type: choice
        options:
          - n64
          - z64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential binutils gcc-multilib

      - name: Clone libdragon
        run: |
          if [ ! -d "libdragon" ]; then
            git clone https://github.com/dragonminded/libdragon.git
          fi

      - name: Build libdragon
        run: |
          mkdir -p libdragon_build
          make -C libdragon DESTDIR=$GITHUB_WORKSPACE/libdragon_build install

      - name: Build ROM
        run: |
          mkdir -p build
          make format=${{ github.event.inputs.format }}

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: rom-${{ github.event.inputs.format }}
          path: build/*.${{ github.event.inputs.format }}
